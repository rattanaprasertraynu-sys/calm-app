<!DOCTYPE html>
<html lang="th">
<head>
<link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <title>Calm Space</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Prompt&display=swap" rel="stylesheet">

  <style>



    body {
      margin: 0;
      font-family: 'Prompt', sans-serif;
      background: linear-gradient(180deg, #f8fafc, #eef2f7);
    }

    .container {
      max-width: 600px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin-top: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 10px;
      border: none;
      background: #6366f1;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    .response {
      margin-top: 20px;
      padding: 15px;
      background: #f5f7fb;
      border-radius: 12px;
      display: none;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 20px;
      display: none;
    }

    .option {
      padding: 16px;
      border-radius: 16px;
      background: #f5f7fb;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .option:hover {
      transform: translateY(-3px);
      background: #eef2ff;
    }

    .final {
      margin-top: 20px;
      display: none;
      color: #555;
    }

    .feedback {
      margin-top: 20px;
      display: none;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ddd;
    }
  </style>
</head>

<body>

<div class="container card">
  <h1>🌿 Calm Space</h1>
  <p>พื้นที่ปลอดภัยสำหรับคุณ 🤍 ระบายออกมาได้เลย ไม่มีใครตัดสิน</p>

  <textarea id="inputText" rows="4" placeholder="วันนี้เกิดอะไรขึ้น..."></textarea>
<button onclick="handleSubmit()">ระบายออกมา</button>
  <div class="response" id="responseBox"></div>
  <div class="options" id="optionsBox">
    

<div class="option" onclick="handleFlower('seed', event)">🌱 รู้สึกเบาลงนิดหน่อย</div>
<div class="option" onclick="handleFlower('leaf', event)">🌿 ใจเริ่มนิ่งขึ้น</div>
<div class="option" onclick="handleFlower('blossom', event)">🌸 รู้สึกดีขึ้น</div>
<div class="option" onclick="handleFlower('sunflower', event)">🌻 พร้อมก้าวต่อ</div>

  </div>


  <div class="feedback" id="feedbackBox">
  <p>ช่วยเราปรับปรุงหน่อยได้ไหม 💛</p>
  <input id="feedbackText" placeholder="คุณชอบอะไร / อยากให้ปรับอะไร">
  <button onclick="submitFeedback()">ส่ง feedback</button>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
